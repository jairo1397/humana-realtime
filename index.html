<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación de Gol</title>
    <style>
        @font-face {
            font-family: 'Axiforma Black';
            src: url('./assets/fonts/Kastelov%20-%20Axiforma%20Black.otf') format('opentype');
            font-weight: 900;
            font-style: normal;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Contenedor principal */
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 768px;
            height: 320px;
            background-color: #000;
            transform-origin: top left;
            overflow: hidden;
        }

        /* Video de fondo (remplaza a la imagen de fondo) */
        .video-fondo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* Ocupa todo el ancho y alto sin recortar (puede estirarse) */
            z-index: 0;
        }

        /* Capa del gol (imagen o video) */
        .gol-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* Ocupa todo el ancho y alto sin recortar */
            opacity: 0; 
            z-index: 20;
        }

        /* Contenedor de las capas de transición */
        .transition-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 25; /* Por encima del gol */
            overflow: hidden; 
            pointer-events: none;
        }

        /* Base para las formas circulares */
        .wipe-element {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            width: 0;
            height: 0;
        }

        /* CELESTE */
        .celeste-solid { background-color: #00BFFF; }
        .celeste-hole { background-color: transparent; box-shadow: 0 0 0 300vmax #00BFFF; opacity: 0; }

        /* AZUL */
        .azul-solid { background-color: #0000CD; }
        .azul-hole { background-color: transparent; box-shadow: 0 0 0 300vmax #0000CD; opacity: 0; }

        /* Clases activas cuando hay gol (Se asignan desde Javascript) */
        .is-goal .gol-overlay { animation: showGoal 7s linear forwards; animation-delay: var(--delay, 0ms); }
        .is-goal .celeste-solid { animation: solidCeleste 7s ease-in-out forwards; animation-delay: var(--delay, 0ms); }
        .is-goal .celeste-hole { animation: holeCeleste 7s ease-in-out forwards; animation-delay: var(--delay, 0ms); }
        .is-goal .azul-solid { animation: solidAzul 7s ease-in-out forwards; animation-delay: var(--delay, 0ms); }
        .is-goal .azul-hole { animation: holeAzul 7s ease-in-out forwards; animation-delay: var(--delay, 0ms); }

        /* Keyframes del gol */
        /* Keyframes del gol */
        @keyframes showGoal {
            0% { opacity: 0; }
            43.28% { opacity: 0; } /* 3.03s (3030 / 7000) */
            50.00% { opacity: 1; } /* Termina el fade in suave */
            88.14% { opacity: 1; } /* 6.17s (6170 / 7000) Empieza la transición */
            92.14% { opacity: 0; } /* Se desvanece mientras la transición azul lo cubre */
            100% { opacity: 0; }
        }

        /* KEYFRAMES CELESTE */
        @keyframes solidCeleste {
            0%, 88.13% { width: 0; height: 0; opacity: 1; } /* Inicia en 6.17s */
            90.71%, 94.27% { width: 300vmax; height: 300vmax; opacity: 1; }
            94.28%, 100% { width: 300vmax; height: 300vmax; opacity: 0; }
        }
        @keyframes holeCeleste {
            0%, 94.27% { width: 0; height: 0; opacity: 0; }
            94.28% { width: 0; height: 0; opacity: 1; }
            98.57%, 100% { width: 300vmax; height: 300vmax; opacity: 1; }
        }

        /* KEYFRAMES AZUL */
        @keyframes solidAzul {
            0%, 89.56% { width: 0; height: 0; opacity: 1; }
            92.14% { width: 300vmax; height: 300vmax; opacity: 1; }
            92.15%, 100% { width: 300vmax; height: 300vmax; opacity: 0; }
        }
        @keyframes holeAzul {
            0%, 92.14% { width: 0; height: 0; opacity: 0; }
            92.15% { width: 0; height: 0; opacity: 1; } 
            96.42%, 100% { width: 300vmax; height: 300vmax; opacity: 1; } 
        }

        /* ANIMACIONES PARA OTROS EQUIPOS (Sin video, solo círculos) */
        .is-goal-other .celeste-solid { animation: otherSolidCeleste 2s ease-in-out forwards; animation-delay: calc(3030ms + var(--delay, 0ms)); }
        .is-goal-other .celeste-hole { animation: otherHoleCeleste 2s ease-in-out forwards; animation-delay: calc(3030ms + var(--delay, 0ms)); }
        .is-goal-other .azul-solid { animation: otherSolidAzul 2s ease-in-out forwards; animation-delay: calc(3030ms + var(--delay, 0ms)); }
        .is-goal-other .azul-hole { animation: otherHoleAzul 2s ease-in-out forwards; animation-delay: calc(3030ms + var(--delay, 0ms)); }

        @keyframes otherSolidCeleste {
            0%, 10% { width: 0; height: 0; opacity: 1; }
            40%, 60% { width: 300vmax; height: 300vmax; opacity: 1; }
            60.01%, 100% { width: 300vmax; height: 300vmax; opacity: 0; }
        }
        @keyframes otherHoleCeleste {
            0%, 60% { width: 0; height: 0; opacity: 0; }
            60.01% { width: 0; height: 0; opacity: 1; }
            90%, 100% { width: 300vmax; height: 300vmax; opacity: 1; }
        }
        @keyframes otherSolidAzul {
            0%, 20% { width: 0; height: 0; opacity: 1; }
            50% { width: 300vmax; height: 300vmax; opacity: 1; }
            50.01%, 100% { width: 300vmax; height: 300vmax; opacity: 0; }
        }
        @keyframes otherHoleAzul {
            0%, 50% { width: 0; height: 0; opacity: 0; }
            50.01% { width: 0; height: 0; opacity: 1; } 
            80%, 100% { width: 300vmax; height: 300vmax; opacity: 1; } 
        }
        
        /* Texto de prueba (Opcional) */
        h1 {
            color: white;
            z-index: 10;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Estilos del marcador (Ajustado para 768x320) */
        .scoreboard {
            position: absolute;
            bottom: 60px;
            right: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #ffffff;
            font-family: 'Axiforma Black', 'Impact', sans-serif;
            z-index: 10;
        }

        .team-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            gap: 17px;
        }

        .team-score {
            font-size: 5.5rem;
            font-weight: 800;
            margin-bottom: -5px;
            line-height: 1;
        }

        .team-name {
            font-size: 39px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
            margin: 0;
        }

        .team-logo {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: white;
            object-fit: cover;
        }

        .divider {
            width: 4px;
            height: 160px;
            background-color: white;
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Video de fondo (siempre reproduciéndose en bucle) -->
        <video class="video-fondo" autoplay muted loop playsinline>
            <source src="./assets/FONDO MARCADOR.mp4" type="video/mp4">
        </video>

        <!-- Video del gol superpuesto con animación CSS -->
        <video class="gol-overlay" muted playsinline>
            <source src="./assets/GOL.mp4" type="video/mp4">
        </video>

        <!-- Capas de transición circulares (Abre el hueco desde el centro) -->
        <div class="transition-container">
            <div class="wipe-element celeste-solid"></div>
            <div class="wipe-element celeste-hole"></div>
            <div class="wipe-element azul-solid"></div>
            <div class="wipe-element azul-hole"></div>
        </div>

        <!-- Marcador superpuesto -->
        <div class="scoreboard" id="scoreboard" style="display: none;">
            <div class="team-col">
                <span class="team-score" id="home-score">0</span>
                <span class="team-name" id="home-name">LOCAL</span>
                <img class="team-logo" id="home-logo" src="" alt="Home">
            </div>
            <div class="team-col">
                <span class="team-score" id="away-score">0</span>
                <span class="team-name" id="away-name">VISITA</span>
                <img class="team-logo" id="away-logo" src="" alt="Away">
            </div>
        </div>
        
    </div>

    <script src="./js/GoalManager.js"></script>
    <script>
        // --- ESCALADO AUTOMÁTICO --- 
        function ajustarEscala() {
            const container = document.querySelector('.container');
            const scaleX = window.innerWidth / 768;
            const scaleY = window.innerHeight / 320;
            container.style.transform = `scale(${scaleX}, ${scaleY})`;
        }
        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        // Obtener el ID de la URL y arrancar
        const urlParams = new URLSearchParams(window.location.search);
        let fixtureId = urlParams.get('id');

        if (!fixtureId) {
            console.log("No se proporcionó ID en la URL. Usando el ID 9 por defecto.");
            fixtureId = 9;
        }
        
        // Inicializar la lógica encapsulada
        const goalManager = new GoalManager({
            fixtureId: fixtureId
        });
        
        goalManager.fetchInitialData();
    </script>
</body>
</html>
